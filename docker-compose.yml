services:

  # Minimal client — plain python:3.11-slim, no extra services.
  # Use this for basic C2 testing without the full victim environment.
  client:
    build: .
    env_file: .env
    environment:
      CLIENT_ID: ${CLIENT_ID:-NADAV}_docker
    restart: unless-stopped

  # Full victim environment — Ubuntu 20.04 with deliberately misconfigured services.
  # Mirrors Metasploitable2: SSH (root/root), FTP (anonymous), MySQL (root/empty),
  # Samba (open share), Apache on port 80.
  # Use this for the demo: docker compose up --build victim
  victim:
    build:
      context: .
      dockerfile: Dockerfile.victim
    env_file: .env
    environment:
      CLIENT_ID: ${CLIENT_ID:-NADAV}_victim
    ports:
      - "8080:80"     # victim webapp → http://localhost:8080
    restart: unless-stopped
